{% extends 'dadjokes/base.html' %}

{% block content %}
  <h2>All Pictures</h2>
  {% for picture in pictures %}
    <img src="{{ picture.image_url }}" width="400">
    <p>— {{ picture.name }}</p>
  {% endfor %}
{% endblock %}
