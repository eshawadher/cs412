{% extends 'dadjokes/base.html' %}

{% block content %}
  <h2>All Dad Jokes</h2>
  {% for joke in jokes %}
    <p><strong>{{ joke.text }}</strong> — {{ joke.name }}</p>
  {% endfor %}
{% endblock %}
