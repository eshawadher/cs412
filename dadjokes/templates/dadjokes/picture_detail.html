{% extends 'dadjokes/base.html' %}

{% block content %}
  <h2>Picture</h2>
  <img src="{{ picture.image_url }}" width="400">
  <p>— {{ picture.name }}</p>
  <a href="{% url 'pictures_list' %}">Back to all pictures</a>
{% endblock %}
