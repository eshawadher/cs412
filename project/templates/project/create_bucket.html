{% extends 'project/base.html' %}

{% block content %}

<div style="max-width:650px; margin:50px auto;">

    <div style="
        background:white;
        padding:35px;
        border-radius:18px;
        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    ">

        <h2 style="font-size:30px; margin-bottom:25px; color:#1e293b;">
            🌍 Create Bucket List Entry
        </h2>

        <form method="POST">
            {% csrf_token %}

            <!-- dest -->
            <label style="font-weight:700; color:#1e293b;">Destination</label>
            <div style="margin-top:8px; margin-bottom:18px;">
                {{ form.destination }}
            </div>

            <!-- priotirt -->
            <label style="font-weight:700; color:#1e293b;">Priority</label>
            <div style="margin-top:8px; margin-bottom:18px;">
                {{ form.priority }}
            </div>

            <!-- status -->
            <label style="font-weight:700; color:#1e293b;">Status</label>
            <div style="margin-top:8px; margin-bottom:18px;">
                {{ form.status }}
            </div>

            <!-- notes -->
            <label style="font-weight:700; color:#1e293b;">Notes</label>
            <div style="margin-top:8px; margin-bottom:10px;">
                {{ form.notes }}
            </div>

            <p style="font-size:13px; color:#64748b; text-align:right;">
                Add anything helpful for your future trip ✈️
            </p>

            <!-- bittons -->
            <div style="margin-top:25px; display:flex; gap:12px;">

                <button type="submit" style="
                    background:#0f766e;
                    color:white;
                    padding:12px 24px;
                    border:none;
                    border-radius:12px;
                    font-weight:700;
                    cursor:pointer;
                    box-shadow:0 6px 14px rgba(15,118,110,0.25);
                ">
                    + Create
                </button>

                <a href="{% url 'bucket_list' %}" style="
                    text-decoration:none;
                    color:#0f766e;
                    border:1px solid #0f766e;
                    padding:12px 20px;
                    border-radius:12px;
                    font-weight:700;
                ">
                    Cancel
                </a>

            </div>

        </form>
    </div>
</div>

{% endblock %}
