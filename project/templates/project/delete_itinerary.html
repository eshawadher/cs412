{% extends 'project/base.html' %}

{% block content %}

<h2>Delete Itinerary Item</h2>

<p>Are you sure you want to delete this itinerary item?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<p><a href="{% url 'trips' %}">Cancel</a></p>

{% endblock %}
