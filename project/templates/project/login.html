{% extends 'project/base.html' %}

{% block content %}

<!-- centered card container-->
<div style="max-width:450px; margin:55px auto;">
    <!--styling -->
    <div style="
        background:white;
        padding:35px;
        border-radius:18px;
        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    ">
        <h2 style="font-size:32px; margin-bottom:10px; color:#1e293b;">
            Login
        </h2>
        <p style="color:#64748b; margin-bottom:25px;">
            Welcome back to your travel bucket list.
        </p>

        <!-- login form -->
        <form method="POST">

            {% csrf_token %}


            {{ form.as_p }}

            <!-- tells Django where to redirect the user after a successful login -->
            <input type="hidden" name="next" value="{% url 'my_profile' %}">

            <button type="submit" style="
                width:100%;
                margin-top:18px;
                background:#0f766e;
                color:white;
                border:none;
                padding:14px;
                border-radius:12px;
                font-weight:700;
                font-size:16px;
                cursor:pointer;
                box-shadow:0 6px 14px rgba(15,118,110,0.25);
            ">
                Login
            </button>
        </form>
    </div>
</div>

{% endblock %}
